name: Mise à jour quotidienne Judilibre

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install requests

      - name: Récupérer les nouveaux arrêts
        env:
          PISTE_CLIENT_ID:     ${{ secrets.PISTE_CLIENT_ID }}
          PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
        run: python fetch_judilibre.py

      - name: Sauvegarder data.json
        run: |
          git config user.name "juris-bot"
          git config user.email "juris-bot@users.noreply.github.com"
          git add data.json || true
          git commit -m "maj arrêts $(date +'%Y-%m-%d')" || echo "rien à committer"
          git push || echo "rien à pousser"

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
        id: deployment
